name: Build and Deploy Lectures
on:
  push:
    branches:
      - main
    paths:
      - 'lectures/**'
      - 'assessments/**'
      - 'workshops/**'
      - 'resources/**'
      - 'css/**'
      - 'Makefile'
      - '_config.toml'
      - 'references.bib'
      - 'apa.csl'
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: write
      id-token: write

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    container:
      image: pandoc/latex:3.9
      options: --user root

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Restore build cache
        uses: actions/cache@v4
        with:
          path: ./build
          key: build-${{ github.sha }}
          restore-keys: |
            build-

      - name: Install Python and Dependencies
        run: |
          apk add --no-cache git python3 py3-pip py3-yaml make
          tlmgr update --self
          tlmgr install libertine \
                  sourcecodepro \
                  ly1 \
                  sectsty \
                  lastpage \
                  hanging \
                  beamer \
                  beamertheme-metropolis \
                  pgfopts \
                  beamercolorthemeowl \
                  noto \
                  noto-emoji
      
      - name: Install git-restore-mtime
        run: |
          wget -O /usr/local/bin/git-restore-mtime https://raw.githubusercontent.com/MestreLion/git-tools/main/git-restore-mtime
          chmod +x /usr/local/bin/git-restore-mtime

      - name: Debug workspace
        run: |
          echo "pwd: $(pwd)"
          echo "GITHUB_WORKSPACE=$GITHUB_WORKSPACE"
          echo "id: $(id)"
          ls -la "$GITHUB_WORKSPACE" | head -10
          ls -la "$GITHUB_WORKSPACE/.git" | head -5 || echo "NO .git FOUND"

      - name: Restore file mtimes
        env:
          GIT_CONFIG_GLOBAL: /tmp/gitconfig-override
        run: |
          printf '[safe]\n\tdirectory = *\n' > /tmp/gitconfig-override
          git-restore-mtime

      - name: Install Dart Sass
        run: |
          wget -O dart-sass.tar.gz https://github.com/sass/dart-sass/releases/download/1.89.2/dart-sass-1.89.2-linux-x64-musl.tar.gz
          tar -xzf dart-sass.tar.gz -C /usr/local/
          echo "/usr/local/dart-sass" >> $GITHUB_PATH
          rm dart-sass.tar.gz
          /usr/local/dart-sass/sass --version

      - name: Build public documents for website
        run: |
          make public

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './build'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
